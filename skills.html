<body data-page="skills">
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="container">
    <header class="site-header">
      <div>
        <h1 class="logo"><a href="/index.html">cocy news</a></h1>
        <p class="header-date">AI 스킬 매거진</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="다크모드 토글">다크모드</button>
    </header>

    <nav class="date-nav">
      <a href="/index.html">← 뉴스</a>
      <a href="/blog.html">블로그</a>
      <a href="/archive.html">아카이브</a>
    </nav>

    <div class="skills-hero">
      <h2>🤖 AI 스킬 디스커버리</h2>
      <p>AI 에이전트가 쓸 수 있는 새로운 기능들을 매거진 형태로 소개합니다</p>
    </div>

    <div class="skills-filters" id="filters"></div>

    <main>
      <div class="skills-grid" id="skills-grid"></div>
      <p id="skills-empty" class="empty-state" hidden>등록된 스킬이 없습니다.</p>
    </main>

    <footer class="site-footer">
      <p>Powered by AI · <a href="https://cocy.io" target="_blank" rel="noopener noreferrer">cocy.io</a></p>
    </footer>
  </div>

  <script>
    // Theme
    const tt = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    tt?.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
      localStorage.setItem('theme', isDark ? '' : 'dark');
    });

    const CATEGORY_LABELS = {
      all: '전체',
      productivity: '생산성',
      korea: '한국 특화',
      dev: '개발',
      media: '미디어',
      data: '데이터',
      lifestyle: '생활',
    };

    let allSkills = [];
    let selectedCategory = 'all';

    function renderFilters() {
      const el = document.getElementById('filters');
      el.innerHTML = Object.entries(CATEGORY_LABELS).map(([k, v]) =>
        `<button data-cat="${k}" class="${k === selectedCategory ? 'active' : ''}">${v}</button>`
      ).join('');
      el.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedCategory = btn.dataset.cat;
          renderFilters();
          renderSkills();
        });
      });
    }

    function renderSkills() {
      const grid = document.getElementById('skills-grid');
      const empty = document.getElementById('skills-empty');
      const filtered = selectedCategory === 'all' ? allSkills : allSkills.filter(s => s.category === selectedCategory);

      if (filtered.length === 0) { grid.innerHTML = ''; empty.hidden = false; return; }
      empty.hidden = true;

      grid.innerHTML = filtered.map(s => `
        <a class="skill-card" href="${s.url || '#'}" target="_blank" rel="noopener noreferrer">
          <div class="skill-icon">${s.icon || '🔧'}</div>
          <h3>${s.title}</h3>
          <p class="skill-desc">${s.description}</p>
          <div class="skill-meta">
            <span class="skill-category">${CATEGORY_LABELS[s.category] || s.category}</span>
            ${s.addedAt ? `<span class="skill-date">${new Date(s.addedAt).toLocaleDateString('ko-KR')}</span>` : ''}
          </div>
          ${s.tags?.length ? `<div class="skill-tags">${s.tags.map(t => `<span class="skill-tag">#${t}</span>`).join('')}</div>` : ''}
        </a>
      `).join('');
    }

    (async () => {
      try {
        const res = await fetch('/skills.json');
        const data = await res.json();
        allSkills = data.skills || [];
        allSkills.sort((a, b) => (b.addedAt || '').localeCompare(a.addedAt || ''));
        renderFilters();
        renderSkills();
      } catch {
        document.getElementById('skills-empty').hidden = false;
      }
    })();
  </script>
