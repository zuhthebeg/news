  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    window.onGoogleLibraryLoad = function() {
      google.accounts.id.initialize({
        client_id: '402340265805-ogo2c09qujqk6gape9oea7sfh8lsegln.apps.googleusercontent.com',
        callback: handleGoogleCredential,
        use_fedcm_for_prompt: true
      });
      renderGoogleBtn();
    };
    function renderGoogleBtn() {
      var wrap = document.getElementById('google-signin-btn');
      if (!wrap) return;
      google.accounts.id.renderButton(wrap, { theme: 'outline', size: 'large', width: 280, text: 'signin_with', locale: 'ko' });
    }
    async function handleGoogleCredential(response) {
      var errEl = document.getElementById('login-error');
      try {
        var res = await fetch('https://relay.cocy.io/api/auth/google/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        var d = await res.json();
        if (!res.ok) throw new Error(d.error || 'Google 로그인 실패');
        if (typeof setTokens === 'function') setTokens(d.accessToken, d.refreshToken);
        if (typeof setUser === 'function') setUser(d.user);
        if (typeof closeLogin === 'function') closeLogin();
        if (typeof renderAuthUI === 'function') renderAuthUI();
        if (typeof renderNews === 'function') renderNews();
      } catch(e) {
        if (errEl) errEl.textContent = e.message;
      }
    }
  </script>
